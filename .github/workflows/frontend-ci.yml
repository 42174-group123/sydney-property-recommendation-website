name: Frontend CI

on:
  pull_request:
    paths:
      - "stay-scout/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "stay-scout/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Lint, Typecheck, Smoke Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stay-scout
    env:
      NITRO_PRESET: vercel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stay-scout/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test
        run: npm run test

      - name: Build
        run: npm run build
