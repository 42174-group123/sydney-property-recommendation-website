name: Vercel Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NITRO_PRESET: vercel

jobs:
  deploy:
    name: Build and Deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stay-scout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stay-scout/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run CI checks before deployment
        run: npm run ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        if: github.event_name == 'pull_request'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel preview artifacts
        if: github.event_name == 'pull_request'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel production environment
        if: github.event_name != 'pull_request'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel production artifacts
        if: github.event_name != 'pull_request'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel production
        if: github.event_name != 'pull_request'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
